<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FaridFX – Signal Terminal</title>
<style>
  :root {
    --bg-dark: #050a0f;
    --bg-panel: #0a1520;
    --border: #1a3a5c;
    --text-main: #c8dde8;
    --text-muted: #4a7090;
    --accent: #00c8ff;
    --success: #00ff9d;
    --danger: #ff3f5a;
  }
  
  body { 
    font-family: monospace; 
    background: var(--bg-dark); 
    color: var(--text-main); 
    margin: 0; 
    padding: 20px; 
  }
  
  h2 { color: var(--accent); letter-spacing: 2px; margin-bottom: 5px; }
  p.subtitle { color: var(--text-muted); font-size: .8rem; margin-bottom: 24px; letter-spacing: 1px; }

  /* Layout Container */
  .container {
    display: flex;
    gap: 30px;
    align-items: flex-start;
  }
  
  .panel {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
  }
  
  .form-panel { flex: 1; max-width: 600px; }
  .history-panel { flex: 1.2; min-width: 400px; }

  /* Form Styles */
  label { display: block; margin-bottom: 4px; font-size: .75rem; color: var(--text-muted); letter-spacing: 1px; }
  input, select {
    display: block; width: 100%; padding: 8px 10px;
    background: var(--bg-dark); border: 1px solid var(--border);
    color: var(--text-main); font-family: monospace; font-size: .9rem;
    margin-bottom: 14px; border-radius: 3px; box-sizing: border-box;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }

  /* Buttons */
  .btn {
    padding: 10px 20px; font-weight: 700; font-family: monospace; font-size: .85rem;
    border: none; border-radius: 3px; cursor: pointer; letter-spacing: 1px;
    transition: 0.2s; text-transform: uppercase;
  }
  .btn-primary { background: var(--accent); color: var(--bg-dark); width: 100%; margin-top: 10px; }
  .btn-primary:hover { background: var(--success); }
  .btn-primary:disabled { background: var(--text-muted); cursor: not-allowed; }
  
  .btn-danger { background: rgba(255,63,90,.1); color: var(--danger); border: 1px solid var(--danger); padding: 6px 12px; font-size: .7rem; }
  .btn-danger:hover { background: var(--danger); color: var(--bg-dark); }
  
  .btn-icon { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 6px 12px; font-size: .7rem; }
  .btn-icon:hover { background: var(--accent); color: var(--bg-dark); }

  /* Notifications */
  .msg {
    margin-bottom: 15px; padding: 10px 15px; border-radius: 3px; font-size: .8rem; display: none;
  }
  .msg.success { background: rgba(0,255,157,.1); border: 1px solid rgba(0,255,157,.3); color: var(--success); }
  .msg.error { background: rgba(255,63,90,.1); border: 1px solid rgba(255,63,90,.3); color: var(--danger); }
  
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 20px; }

  /* History Table */
  .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
  .history-header h3 { margin: 0; color: var(--accent); font-size: 1rem; }
  
  .table-container { max-height: 500px; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; font-size: .8rem; }
  th, td { padding: 8px; text-align: left; border-bottom: 1px solid var(--border); }
  th { color: var(--text-muted); position: sticky; top: 0; background: var(--bg-panel); z-index: 10; }
  tr:hover { background: rgba(255,255,255,0.02); }
  
  /* Status Colors */
  .t-buy { color: var(--success); font-weight: bold; }
  .t-sell { color: var(--danger); font-weight: bold; }
  .t-close { color: #f39c12; }
  .t-pending { color: var(--accent); }
  
  .s-placed { color: var(--text-muted); }
  .s-executed { color: var(--success); }
  .s-closed { color: #f39c12; }

  @media (max-width: 900px) {
    .container { flex-direction: column; }
    .form-panel, .history-panel { width: 100%; max-width: 100%; box-sizing: border-box; }
    .grid-2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<h2>FARIDFX // TERMINAL</h2>
<p class="subtitle">Manual Injector & Signal History Monitor</p>

<div class="container">
  <!-- KIRI: FORM MANUAL INJECT -->
  <div class="panel form-panel">
    <div id="messageBox" class="msg"></div>
    <form id="signalForm">
      <div class="grid-2">
        <div>
          <label>SYMBOL</label>
          <input name="symbol" value="BTCUSD" required>
          <label>ACTION</label>
          <select name="action">
            <option>BUY</option><option>SELL</option><option>CLOSE</option><option>PENDING</option>
          </select>
          <label>STATUS</label>
          <select name="status">
             <option value="MANUAL">MANUAL</option><option value="PLACED">PLACED</option><option value="EXECUTED">EXECUTED</option><option value="CLOSED">CLOSED</option>
          </select>
          <label>PRICE (ENTRY)</label>
          <input name="price" type="number" step="0.00001" value="0">
          <label>STOP LOSS</label>
          <input name="sl" type="number" step="0.00001" value="0">
        </div>
        <div>
          <label>TAKE PROFIT</label>
          <input name="tp" type="number" step="0.00001" value="0">
          <label>LOT SIZE</label>
          <input name="lots" type="number" step="0.01" value="0.10">
          <label>PROFIT / PIPS</label>
          <div style="display:flex; gap:10px;">
             <input name="profit" type="number" step="0.01" value="0" placeholder="Profit $">
             <input name="pips" type="number" step="0.1" value="0" placeholder="Pips">
          </div>
          <label>COMMENT</label>
          <input name="comment" value="Manual Test">
        </div>
      </div>
      <button type="submit" id="submitBtn" class="btn btn-primary">KIRIM SINYAL</button>
    </form>
  </div>

  <!-- KANAN: HISTORY PANEL -->
  <div class="panel history-panel">
    <div class="history-header">
      <h3>SIGNAL HISTORY</h3>
      <div>
        <button id="btnRefresh" class="btn btn-icon">↻ REFRESH</button>
        <button id="btnClear" class="btn btn-danger">CLEAR ALL</button>
      </div>
    </div>
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>TIME</th>
            <th>SYMBOL</th>
            <th>ACTION</th>
            <th>STATUS</th>
            <th>PRICE</th>
            <th>PROFIT</th>
          </tr>
        </thead>
        <tbody id="historyBody">
          <tr><td colspan="6" style="text-align:center; color:#4a7090; padding:20px;">Memuat data...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const API_SECRET = 'farid_1124'; 
  const API_URL = '/api/webhook'; 

  const form = document.getElementById('signalForm');
  const msgBox = document.getElementById('messageBox');
  const submitBtn = document.getElementById('submitBtn');
  const historyBody = document.getElementById('historyBody');
  const btnRefresh = document.getElementById('btnRefresh');
  const btnClear = document.getElementById('btnClear');

  // --- FUNGSI: Tampilkan Pesan Notif ---
  function showMsg(text, isError = false) {
    msgBox.innerHTML = text;
    msgBox.className = 'msg ' + (isError ? 'error' : 'success');
    msgBox.style.display = 'block';
    setTimeout(() => msgBox.style.display = 'none', 5000);
  }

  // --- FUNGSI: Format Waktu ---
  function formatTime(isoString) {
    const d = new Date(isoString);
    return d.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  }

  // --- FUNGSI: Load Data History (GET) ---
  async function loadHistory() {
    historyBody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#4a7090;">Memuat data...</td></tr>';
    try {
      const res = await fetch(API_URL);
      const data = await res.json();
      
      if (!data.history || data.history.length === 0) {
        historyBody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#4a7090;">Belum ada riwayat sinyal.</td></tr>';
        return;
      }

      let html = '';
      data.history.forEach(s => {
        // Styling berdasarkan action
        let actionClass = '';
        if(s.action === 'BUY') actionClass = 't-buy';
        if(s.action === 'SELL') actionClass = 't-sell';
        if(s.action === 'CLOSE') actionClass = 't-close';
        if(s.action === 'PENDING') actionClass = 't-pending';
        
        // Styling berdasarkan status
        let statusClass = '';
        if(s.status === 'PLACED') statusClass = 's-placed';
        if(s.status === 'EXECUTED') statusClass = 's-executed';
        if(s.status === 'CLOSED') statusClass = 's-closed';

        html += `
          <tr>
            <td style="color:#4a7090;">${formatTime(s.timestamp)}</td>
            <td>${s.symbol}</td>
            <td class="${actionClass}">${s.action}</td>
            <td class="${statusClass}">${s.status || '-'}</td>
            <td>${s.price.toFixed(s.symbol.includes('JPY') ? 3 : 2)}</td>
            <td style="color:${s.profit > 0 ? '#00ff9d' : (s.profit < 0 ? '#ff3f5a' : '#c8dde8')}">
              ${s.profit ? '$'+s.profit.toFixed(2) : '-'}
            </td>
          </tr>
        `;
      });
      historyBody.innerHTML = html;
    } catch (e) {
      historyBody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#ff3f5a;">Gagal memuat data.</td></tr>';
    }
  }

  // --- EVENT: Submit Form (POST) ---
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    submitBtn.innerText = 'MENGIRIM...'; submitBtn.disabled = true;

    const payload = {
      secret: API_SECRET,
      symbol: form.symbol.value,
      action: form.action.value,
      mode: form.mode.value,
      price: parseFloat(form.price.value),
      sl: parseFloat(form.sl.value),
      tp: parseFloat(form.tp.value),
      lots: parseFloat(form.lots.value),
      profit: parseFloat(form.profit.value),
      pips: parseFloat(form.pips.value),
      comment: form.comment.value,
      status: form.status.value 
    };

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      
      if (response.ok) {
        showMsg('✅ Sinyal manual berhasil dikirim!');
        loadHistory(); // Refresh tabel
      } else {
        const res = await response.json();
        showMsg('❌ Gagal: ' + (res.error || 'Unknown error'), true);
      }
    } catch (err) {
      showMsg('❌ Gagal menghubungi server!', true);
    }
    submitBtn.innerText = 'KIRIM SINYAL'; submitBtn.disabled = false;
  });

  // --- EVENT: Tombol Hapus (DELETE) ---
  btnClear.addEventListener('click', async () => {
    if(!confirm("Apakah Anda yakin ingin MENGHAPUS SEMUA riwayat sinyal?")) return;
    
    btnClear.innerText = '...'; btnClear.disabled = true;
    try {
      const response = await fetch(API_URL, {
        method: 'DELETE',
        headers: { 'x-secret': API_SECRET }
      });
      
      if(response.ok) {
        showMsg('✅ Riwayat berhasil dihapus!');
        loadHistory();
      } else {
        showMsg('❌ Gagal menghapus riwayat.', true);
      }
    } catch(e) {
      showMsg('❌ Terjadi kesalahan jaringan.', true);
    }
    btnClear.innerText = 'CLEAR ALL'; btnClear.disabled = false;
  });

  // --- EVENT: Tombol Refresh ---
  btnRefresh.addEventListener('click', loadHistory);

  // --- INIT: Load saat halaman dibuka ---
  loadHistory();
</script>
</body>
</html>
